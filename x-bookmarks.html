<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%231d9bf0'/><path d='M6 3h10a1.5 1.5 0 011.5 1.5v14L12 15.5 6.5 18.5V4.5A1.5 1.5 0 018 3z' fill='white' transform='translate(1,1.5) scale(0.85)'/></svg>">
<title>X Bookmarks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg: #0a0a0a; --surface: #161616; --surface-hover: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.15);
    --text: #f0f0f0; --text-sec: rgba(255,255,255,0.5); --text-dim: rgba(255,255,255,0.35);
    --accent: #1d9bf0; --glass: rgba(255,255,255,0.08); --glass-border: rgba(255,255,255,0.12);
    --like: #f91880; --repost: #00ba7c; --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  ::selection { background:rgba(29,155,240,0.3); }

  .topbar { position:sticky; top:0; z-index:100; background:rgba(10,10,10,0.82); backdrop-filter:blur(20px) saturate(1.4); border-bottom:1px solid var(--border); padding:14px 24px; }
  .topbar-inner { max-width:1400px; margin:0 auto; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .logo { display:flex; align-items:center; gap:8px; font-size:18px; font-weight:700; white-space:nowrap; }
  .logo svg { width:22px; height:22px; fill:var(--text); }
  .stats-bar { display:flex; gap:14px; font-size:12px; color:var(--text-sec); margin-left:4px; }
  .stats-bar strong { color:var(--text); font-weight:600; }

  .search-wrap { flex:1; min-width:200px; max-width:420px; position:relative; }
  .search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; fill:var(--text-dim); pointer-events:none; }
  .search-wrap input { width:100%; padding:9px 14px 9px 38px; background:var(--glass); border:1px solid var(--glass-border); border-radius:24px; color:var(--text); font-size:14px; font-family:inherit; outline:none; transition:border-color 0.2s, background 0.2s; }
  .search-wrap input:focus { border-color:var(--accent); background:rgba(29,155,240,0.06); }
  .search-wrap input::placeholder { color:var(--text-dim); }

  .controls { display:flex; align-items:center; gap:8px; margin-left:auto; }
  .pill { padding:7px 16px; border-radius:20px; border:1px solid var(--glass-border); background:var(--glass); color:var(--text-sec); font-size:12px; font-family:inherit; font-weight:500; cursor:pointer; transition:all 0.2s; backdrop-filter:blur(8px); white-space:nowrap; }
  .pill:hover { background:rgba(255,255,255,0.12); color:var(--text); border-color:var(--border-hover); }
  .pill.active { background:rgba(29,155,240,0.15); border-color:rgba(29,155,240,0.3); color:var(--accent); }
  .pill-accent { background:var(--accent); border-color:var(--accent); color:#fff; }
  .pill-accent:hover { background:#1a8cd8; }

  .filter-sticky { position:sticky; top:var(--topbar-h,56px); z-index:50; background:rgba(10,10,10,0.88); backdrop-filter:blur(20px) saturate(1.4); border-bottom:1px solid var(--border); padding-bottom:8px; transition:padding 0.25s; }
  .filter-sticky.collapsed { padding-bottom:0; }
  .filter-sticky.collapsed .filter-row { margin-top:8px; margin-bottom:8px; flex-wrap:nowrap; overflow:hidden; max-height:34px; }
  .filter-sticky.collapsed .filter-row #filterContainer { flex-wrap:nowrap; overflow:hidden; mask-image:linear-gradient(to right, #000 80%, transparent 100%); -webkit-mask-image:linear-gradient(to right, #000 80%, transparent 100%); }
  .filter-sticky.collapsed .time-row { display:none !important; }
  .filter-toggle { padding:7px 10px; border-radius:20px; border:1px solid var(--glass-border); background:var(--glass); color:var(--text-sec); font-size:12px; font-family:inherit; font-weight:500; cursor:pointer; transition:all 0.2s; backdrop-filter:blur(8px); white-space:nowrap; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .filter-toggle:hover { background:rgba(255,255,255,0.12); color:var(--text); border-color:var(--border-hover); }
  .filter-toggle svg { width:14px; height:14px; fill:currentColor; transition:transform 0.25s; }
  .filter-sticky.collapsed .filter-toggle svg { transform:rotate(180deg); }

  .filter-row { max-width:1400px; margin:12px auto 0; padding:0 24px; display:flex; gap:6px; align-items:flex-start; flex-wrap:wrap; transition:max-height 0.3s ease; }
  .filter-label { font-size:12px; color:var(--text-dim); margin-right:4px; line-height:30px; }
  #filterContainer { display:flex; gap:4px; flex-wrap:wrap; flex:1; min-width:0; transition:all 0.25s; }
  .sort-group { display:flex; gap:4px; flex-shrink:0; }

  .grid-wrap { max-width:1400px; margin:16px auto 0; padding:0 24px 60px; }
  .masonry { columns:4; column-gap:14px; }
  @media(max-width:1200px){ .masonry{columns:3;} }
  @media(max-width:800px){ .masonry{columns:2;} }
  @media(max-width:500px){ .masonry{columns:1;} }

  /* THUMBNAIL GRID VIEW */
  .thumb-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:4px; }
  @media(max-width:500px){ .thumb-grid { grid-template-columns:repeat(3, 1fr); gap:3px; } }
  .thumb { position:relative; aspect-ratio:1; overflow:hidden; border-radius:8px; cursor:pointer; background:#111; }
  .thumb img, .thumb video { width:100%; height:100%; object-fit:cover; display:block; }
  .thumb-overlay { position:absolute; inset:0; background:linear-gradient(transparent 50%, rgba(0,0,0,0.7)); opacity:0; transition:opacity 0.2s; display:flex; align-items:flex-end; padding:8px; }
  .thumb:hover .thumb-overlay { opacity:1; }
  .thumb-overlay span { color:#fff; font-size:11px; display:flex; align-items:center; gap:3px; }
  .thumb-overlay span svg { width:11px; height:11px; fill:currentColor; }
  .thumb-overlay .thumb-stats { display:flex; gap:8px; }
  .thumb-play { position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.6); border-radius:6px; padding:2px 6px; display:flex; align-items:center; gap:2px; }
  .thumb-play svg { width:10px; height:10px; fill:#fff; }
  .thumb-play span { font-size:9px; color:#fff; font-weight:600; }

  /* VIEW TOGGLE */
  .view-toggle { display:flex; gap:2px; background:var(--glass); border:1px solid var(--glass-border); border-radius:10px; padding:2px; }
  .view-btn { width:30px; height:26px; border:none; background:transparent; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .view-btn svg { width:14px; height:14px; fill:var(--text-dim); }
  .view-btn.active { background:rgba(29,155,240,0.15); }
  .view-btn.active svg { fill:var(--accent); }
  .view-btn:hover:not(.active) svg { fill:var(--text-sec); }

  /* CARD */
  .card { break-inside:avoid; margin-bottom:14px; border-radius:var(--radius); overflow:hidden; background:var(--surface); border:1px solid var(--border); cursor:pointer; transition:border-color 0.2s, transform 0.15s; position:relative; }
  .card:hover { border-color:var(--border-hover); transform:translateY(-2px); }
  .card-media { position:relative; background:#111; overflow:hidden; }
  .card-img { width:100%; display:block; object-fit:cover; }
  .card-video { width:100%; display:block; object-fit:cover; }
  .card-multi { position:absolute; bottom:8px; right:8px; padding:3px 9px; border-radius:10px; background:rgba(0,0,0,0.65); backdrop-filter:blur(6px); color:#fff; font-size:10px; font-weight:600; }
  .card-play { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:44px; height:44px; border-radius:50%; background:rgba(0,0,0,0.55); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; pointer-events:none; transition:opacity 0.2s; }
  .card:hover .card-play { opacity:0; }
  .card-body { padding:14px; }
  .card-author { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .card-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:#fff; flex-shrink:0; }
  .card-name { font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:flex; align-items:center; gap:3px; }
  .card-handle { font-size:12px; color:var(--text-dim); }
  .card-name svg { width:14px; height:14px; fill:var(--accent); flex-shrink:0; }
  .card-text { font-size:13px; line-height:1.45; color:rgba(255,255,255,0.78); margin-bottom:10px; max-height:80px; overflow:hidden; position:relative; word-break:break-word; white-space:pre-wrap; }
  .card-text-fade { position:absolute; bottom:0; left:0; right:0; height:30px; background:linear-gradient(transparent, var(--surface)); }
  .card-tags { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
  .tag { padding:2px 8px; border-radius:10px; font-size:10px; font-weight:500; }
  .tag-cat { background:rgba(29,155,240,0.1); color:rgba(29,155,240,0.8); }
  .tag-ai { background:rgba(139,92,246,0.12); color:#a78bfa; }
  .tag-design { background:rgba(236,72,153,0.12); color:#f472b6; }
  .tag-dev { background:rgba(16,185,129,0.12); color:#34d399; }
  .tag-figma { background:rgba(162,89,255,0.15); color:#c084fc; }
  .tag-uiux { background:rgba(244,114,182,0.12); color:#f9a8d4; }
  .tag-startup { background:rgba(251,146,60,0.12); color:#fb923c; }
  .tag-product { background:rgba(56,189,248,0.12); color:#38bdf8; }
  .tag-travel { background:rgba(45,212,191,0.12); color:#2dd4bf; }
  .tag-indonesia { background:rgba(239,68,68,0.12); color:#f87171; }
  .tag-paper { background:rgba(167,139,250,0.12); color:#c4b5fd; }
  .tag-news { background:rgba(250,204,21,0.12); color:#fbbf24; }
  .tag-newtools { background:rgba(52,211,153,0.12); color:#6ee7b7; }
  .tag-motion { background:rgba(249,115,22,0.12); color:#fb923c; }
  .tag-finance { background:rgba(16,185,129,0.12); color:#a7f3d0; }
  .tag-thread { background:rgba(99,102,241,0.12); color:#818cf8; }
  .tag-meme { background:rgba(253,224,71,0.12); color:#fde047; }
  .tag-3d { background:rgba(236,72,153,0.12); color:#f9a8d4; }
  .tag-type { background:rgba(148,163,184,0.12); color:#94a3b8; }
  .tag-branding { background:rgba(251,113,133,0.12); color:#fda4af; }
  .tag-photo { background:rgba(14,165,233,0.12); color:#7dd3fc; }
  .tag-illustration { background:rgba(244,114,182,0.12); color:#f9a8d4; }
  .tag-leadership { background:rgba(217,119,6,0.12); color:#fbbf24; }
  .tag-jobs { background:rgba(34,197,94,0.12); color:#86efac; }
  .tag-tips { background:rgba(168,85,247,0.12); color:#c084fc; }
  .tag-portfolio { background:rgba(99,102,241,0.12); color:#a5b4fc; }
  .tag-claude { background:rgba(217,119,60,0.15); color:#e8956a; }
  .tag-media { background:rgba(249,24,128,0.1); color:rgba(249,24,128,0.8); }
  .pill-starred { background:rgba(250,204,21,0.12); border-color:rgba(250,204,21,0.25); color:#fbbf24; }
  .pill-starred.active { background:rgba(250,204,21,0.2); border-color:rgba(250,204,21,0.4); }

  /* STAR */
  .card-star { position:absolute; top:8px; right:8px; z-index:5; width:32px; height:32px; border-radius:50%; background:rgba(0,0,0,0.5); backdrop-filter:blur(6px); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; }
  .card:hover .card-star { opacity:1; }
  .card-star.starred { opacity:1; background:rgba(250,204,21,0.25); }
  .card-star svg { width:16px; height:16px; fill:none; stroke:rgba(255,255,255,0.6); stroke-width:2; }
  .card-star.starred svg { fill:#fbbf24; stroke:#fbbf24; }
  .thumb-star { position:absolute; top:4px; left:4px; z-index:5; }
  .thumb-star svg { width:14px; height:14px; fill:#fbbf24; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
  .lb-star { padding:8px 16px; border-radius:20px; background:var(--glass); border:1px solid var(--glass-border); color:var(--text); font-size:13px; font-family:inherit; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all 0.2s; margin-right:8px; }
  .lb-star:hover { background:rgba(250,204,21,0.12); border-color:rgba(250,204,21,0.3); }
  .lb-star.starred { background:rgba(250,204,21,0.15); border-color:rgba(250,204,21,0.3); color:#fbbf24; }
  .lb-star svg { width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:2; }
  .lb-star.starred svg { fill:#fbbf24; stroke:#fbbf24; }
  .card-stats { display:flex; gap:12px; font-size:11px; color:var(--text-dim); }
  .card-stats span { display:flex; align-items:center; gap:3px; }
  .card-stats svg { width:12px; height:12px; fill:currentColor; }

  /* LIGHTBOX */
  .lightbox { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; padding:40px; }
  .lightbox.open { display:flex; }
  .lb-close { position:absolute; top:20px; right:20px; width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.1); backdrop-filter:blur(12px); border:1px solid var(--glass-border); cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10; }
  .lb-close:hover { background:rgba(255,255,255,0.2); }
  .lb-close svg { width:20px; height:20px; stroke:#fff; fill:none; stroke-width:2; }
  .lb-content { max-width:700px; width:100%; max-height:90vh; overflow:auto; border-radius:20px; background:var(--surface); border:1px solid var(--border); display:flex; flex-direction:column; }
  .lb-img { width:100%; display:block; border-radius:20px 20px 0 0; max-height:60vh; object-fit:contain; background:#000; flex-shrink:0; }
  .lb-vid { width:100%; display:block; border-radius:20px 20px 0 0; max-height:60vh; object-fit:contain; background:#000; flex-shrink:0; }
  .lb-body { padding:20px; flex-shrink:0; }
  .lb-author { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .lb-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; color:#fff; }
  .lb-name { font-weight:600; font-size:15px; display:flex; align-items:center; gap:4px; }
  .lb-name svg { width:16px; height:16px; fill:var(--accent); }
  .lb-handle { font-size:13px; color:var(--text-sec); }
  .lb-text { font-size:15px; line-height:1.55; margin-bottom:16px; white-space:pre-wrap; word-break:break-word; }
  .lb-extras { display:flex; gap:8px; margin-bottom:14px; overflow-x:auto; padding-bottom:4px; }
  .lb-extras img { height:80px; border-radius:10px; object-fit:cover; flex-shrink:0; }
  .lb-metrics { display:flex; gap:18px; font-size:13px; color:var(--text-sec); margin-bottom:16px; }
  .lb-metrics span { display:flex; align-items:center; gap:5px; }
  .lb-metrics svg { width:15px; height:15px; fill:currentColor; }
  .lb-open { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border-radius:20px; background:var(--glass); border:1px solid var(--glass-border); color:var(--text); font-size:13px; font-family:inherit; cursor:pointer; text-decoration:none; transition:background 0.2s; }
  .lb-open:hover { background:rgba(255,255,255,0.15); }

  /* LIGHTBOX DRAG-DOWN (mobile) */
  .lb-content { transition:transform 0.25s ease, opacity 0.25s ease; will-change:transform,opacity; }
  .lb-content.dragging { transition:none; }
  .lb-drag-hint { width:36px; height:4px; border-radius:2px; background:rgba(255,255,255,0.25); margin:10px auto 0; flex-shrink:0; display:none; }
  @media(max-width:600px) { .lb-drag-hint { display:block; } }

  /* ONBOARDING */
  .onboarding { max-width:480px; margin:100px auto; text-align:center; padding:0 24px; }
  .onboarding h2 { font-size:26px; margin-bottom:8px; font-weight:700; }
  .onboarding>p { color:var(--text-sec); font-size:14px; margin-bottom:28px; line-height:1.5; }
  .drop-zone { border:2px dashed var(--glass-border); border-radius:24px; padding:48px 32px; transition:all 0.25s; cursor:pointer; }
  .drop-zone:hover,.drop-zone.dragover { border-color:var(--accent); background:rgba(29,155,240,0.04); }
  .drop-zone svg { width:44px; height:44px; fill:var(--text-dim); margin-bottom:12px; }
  .drop-zone h3 { font-size:16px; margin-bottom:4px; }
  .drop-zone p { color:var(--text-dim); font-size:13px; margin:0; }
  .drop-zone input { display:none; }
  .onboard-note { color:var(--text-dim); font-size:12px; margin-top:16px; }
  .onboard-divider { color:var(--text-dim); font-size:12px; margin:20px 0; }

  /* SYNC MODAL */
  .sync-modal { position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; }
  .sync-modal.open { display:flex; }
  .sync-box { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:32px; max-width:520px; width:90%; text-align:center; }
  .sync-box h3 { font-size:18px; margin-bottom:10px; }
  .sync-box p { font-size:13px; color:var(--text-sec); margin-bottom:12px; line-height:1.6; }
  .sync-code { background:#111; border:1px solid var(--border); border-radius:12px; padding:14px; text-align:left; font-family:'SF Mono',Monaco,Consolas,monospace; font-size:11px; color:var(--accent); line-height:1.5; word-break:break-all; max-height:120px; overflow:auto; margin-bottom:16px; position:relative; cursor:pointer; }
  .sync-code:hover { border-color:var(--accent); }
  .sync-code::after { content:'Click to copy'; position:absolute; top:8px; right:8px; font-size:10px; color:var(--text-dim); font-family:inherit; }
  .sync-steps { text-align:left; font-size:13px; color:var(--text-sec); line-height:1.8; margin-bottom:16px; }
  .sync-steps b { color:var(--text); }

  .time-row { max-width:1400px; margin:8px auto 0; padding:0 24px; display:flex; gap:6px; align-items:center; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; }
  .time-row::-webkit-scrollbar { display:none; }
  .time-select { padding:7px 12px; border-radius:20px; border:1px solid var(--glass-border); background:var(--glass); color:var(--text-sec); font-size:12px; font-family:inherit; font-weight:500; cursor:pointer; outline:none; appearance:none; -webkit-appearance:none; }
  .time-select:focus { border-color:var(--accent); }
  .time-select option { background:var(--surface); color:var(--text); }
  .load-more { text-align:center; padding:24px; }
  .empty { text-align:center; padding:60px 20px; color:var(--text-sec); }
  .empty h3 { color:var(--text); font-size:16px; margin-bottom:4px; }

  /* MOBILE */
  @media(max-width:640px) {
    .topbar { padding:10px 14px; }
    .topbar-inner { gap:8px; }
    .logo { font-size:16px; }
    .stats-bar { display:none; }
    .search-wrap { min-width:0; max-width:none; order:10; flex-basis:100%; }
    .controls { gap:6px; }
    .controls .pill { padding:6px 10px; font-size:11px; }
    .filter-sticky { padding-bottom:6px; }
    .filter-sticky.collapsed .filter-row { max-height:28px; margin-top:6px; margin-bottom:6px; }
    .filter-row { padding:0 14px; gap:4px; margin-top:8px; }
    .filter-row .pill { padding:5px 10px; font-size:11px; }
    #filterContainer { gap:3px; }
    .sort-group { width:100%; padding-top:2px; gap:3px; }
    .sort-group .pill { padding:5px 10px; font-size:11px; }
    .time-row { padding:0 14px; gap:4px; }
    .time-row .pill { padding:5px 10px; font-size:11px; }
    .grid-wrap { padding:0 10px 40px; margin-top:10px; }
    .masonry { column-gap:10px; }
    .card-body { padding:10px; }
    .card-text { font-size:12px; max-height:60px; }
    .card-stats { font-size:10px; gap:8px; }
    .lightbox { padding:0; }
    .lb-content { max-width:100%; max-height:100vh; border-radius:0; }
    .lb-img, .lb-vid { border-radius:0; }
    .lb-close { top:10px; right:10px; width:36px; height:36px; }
    .lb-body { padding:14px; }
    .lb-text { font-size:14px; }
    .filter-toggle { padding:5px 8px; font-size:11px; }
  }
  .banner { max-width:1400px; margin:12px auto 0; padding:0 24px; }
  .banner-box { background:rgba(29,155,240,0.08); border:1px solid rgba(29,155,240,0.2); border-radius:12px; padding:12px 16px; display:flex; align-items:center; gap:12px; font-size:13px; color:var(--accent); }

// ===== STATE =====
let BK = [], activeFilter = 'All', activeSort = 'newest', searchQuery = '', displayLimit = 80, debounceT = null, activeTimeFilter = null, activeView = 'card';

// ===== STARRED BOOKMARKS (Supabase-synced) =====
const SUPA_URL = 'https://jnzbvmfsdqjngpzewfzq.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuemJ2bWZzZHFqbmdwemV3ZnpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mjc2MTAsImV4cCI6MjA5MTIwMzYxMH0.Mc62za86DJskzz9ml0yxQzgyNaYe3GuIQudF9TK6HIE';
const supaHeaders = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' };

let starredIds = new Set();

async function loadStarred() {
  // Load from local IDB first (instant)
  try {
    const db = await IDB.open();
    const tx = db.transaction('data', 'readonly');
    const req = tx.objectStore('data').get('starred');
    await new Promise(r => { req.onsuccess = () => { const v = req.result; if (Array.isArray(v)) starredIds = new Set(v); r(); }; req.onerror = () => r(); });
  } catch(e) {}
  // Then sync from Supabase (async, merges)
  syncStarredFromCloud();
}

async function syncStarredFromCloud() {
  try {
    const resp = await fetch(SUPA_URL + '/rest/v1/starred?select=tweet_id', { headers: supaHeaders });
    if (!resp.ok) return;
    const rows = await resp.json();
    const cloudIds = new Set(rows.map(r => r.tweet_id));
    // Merge: union of local + cloud
    let changed = false;
    cloudIds.forEach(id => { if (!starredIds.has(id)) { starredIds.add(id); changed = true; } });
    // Push any local-only stars to cloud
    const localOnly = [...starredIds].filter(id => !cloudIds.has(id));
    if (localOnly.length > 0) {
      fetch(SUPA_URL + '/rest/v1/starred', {
        method: 'POST', headers: { ...supaHeaders, 'Prefer': 'resolution=ignore-duplicates' },
        body: JSON.stringify(localOnly.map(id => ({ tweet_id: id })))
      }).catch(() => {});
    }
    if (changed) { saveStarredLocal(); if (BK.length) { renderFilters(); render(); } }
  } catch(e) {}
}

function saveStarredLocal() {
  IDB.open().then(db => {
    const tx = db.transaction('data', 'readwrite');
    tx.objectStore('data').put([...starredIds], 'starred');
  }).catch(() => {});
}

function toggleStar(id, evt) {
  if (evt) { evt.stopPropagation(); evt.preventDefault(); }
  const adding = !starredIds.has(id);
  if (adding) starredIds.add(id); else starredIds.delete(id);
  saveStarredLocal();
  // Sync to Supabase
  if (adding) {
    fetch(SUPA_URL + '/rest/v1/starred', {
      method: 'POST', headers: { ...supaHeaders, 'Prefer': 'resolution=ignore-duplicates' },
      body: JSON.stringify({ tweet_id: id })
    }).catch(() => {});
  } else {
    fetch(SUPA_URL + '/rest/v1/starred?tweet_id=eq.' + id, {
      method: 'DELETE', headers: supaHeaders
    }).catch(() => {});
  }
  render();
  // Update lightbox star if open
  const lbStar = document.getElementById('lbStarBtn');
  if (lbStar && lbStar.dataset.id === id) {
    lbStar.className = 'lb-star' + (starredIds.has(id) ? ' starred' : '');
    lbStar.querySelector('span').textContent = starredIds.has(id) ? 'Starred' : 'Star';
  }
}

// ===== CLOUD BOOKMARK SYNC (Supabase) =====
async function pushToCloud(rawBookmarks) {
  if (!rawBookmarks.length) return;
  const BATCH = 200;
  for (let i = 0; i < rawBookmarks.length; i += BATCH) {
    const batch = rawBookmarks.slice(i, i + BATCH)
      .map(b => ({ tweet_id: b.i || b.id || b.tweetId || '', data: b }))
      .filter(r => r.tweet_id);
    if (!batch.length) continue;
    try {
      await fetch(SUPA_URL + '/rest/v1/bookmarks', {
        method: 'POST',
        headers: { ...supaHeaders, 'Prefer': 'resolution=ignore-duplicates' },
        body: JSON.stringify(batch)
      });
    } catch(e) {}
  }
}

async function pullCloudIds() {
  const ids = [];
  let offset = 0;
  while (true) {
    const r = await fetch(SUPA_URL + '/rest/v1/bookmarks?select=tweet_id&limit=1000&offset=' + offset, { headers: supaHeaders });
    if (!r.ok) return null;
    const rows = await r.json();
    ids.push(...rows.map(r => r.tweet_id));
    if (rows.length < 1000) break;
    offset += 1000;
  }
  return ids;
}

async function pullCloudData(tweetIds) {
  if (!tweetIds.length) return [];
  const all = [];
  const CHUNK = 100;
  for (let i = 0; i < tweetIds.length; i += CHUNK) {
    const ids = tweetIds.slice(i, i + CHUNK).map(id => '"' + id + '"').join(',');
    const r = await fetch(SUPA_URL + '/rest/v1/bookmarks?select=data&tweet_id=in.(' + ids + ')', { headers: supaHeaders });
    if (r.ok) all.push(...(await r.json()).map(r => r.data));
  }
  return all;
}

async function pullAllCloudData() {
  const all = [];
  let offset = 0;
  while (true) {
    const r = await fetch(SUPA_URL + '/rest/v1/bookmarks?select=data&limit=1000&offset=' + offset, { headers: supaHeaders });
    if (!r.ok) return null;
    const rows = await r.json();
    all.push(...rows.map(r => r.data));
    if (rows.length < 1000) break;
    offset += 1000;
  }
  return all;
}

async function cloudSync(localRaw) {
  try {
    const cloudIds = await pullCloudIds();
    if (cloudIds === null) return;

    const localIds = new Set(localRaw.map(b => b.i || b.id || b.tweetId || ''));
    const cloudIdSet = new Set(cloudIds);

    // Pull: items in cloud but not local
    const missing = cloudIds.filter(id => !localIds.has(id));
    if (missing.length > 0) {
      const newData = await pullCloudData(missing);
      if (newData.length) {
        const merged = [...localRaw, ...newData];
        load(merged);
        setStatus(newData.length + ' new bookmarks synced from cloud');
      }
    }

    // Push: items in local but not cloud
    const toUpload = localRaw.filter(b => !cloudIdSet.has(b.i || b.id || b.tweetId || ''));
    if (toUpload.length > 0) pushToCloud(toUpload);
  } catch(e) {}
}

// ===== IndexedDB PERSISTENCE =====
const IDB = {
  _db: null,
  open() {
    return new Promise((resolve, reject) => {
      if (this._db) { resolve(this._db); return; }
      const req = indexedDB.open('xbookmarks', 1);
      req.onupgradeneeded = e => { e.target.result.createObjectStore('data'); };
      req.onsuccess = e => { this._db = e.target.result; resolve(this._db); };
      req.onerror = e => reject(e);
    });
  },
  async save(raw) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('data', 'readwrite');
      tx.objectStore('data').put(raw, 'bookmarks');
      tx.oncomplete = () => resolve();
      tx.onerror = e => reject(e);
    });
  },
  async get() {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('data', 'readonly');
      const req = tx.objectStore('data').get('bookmarks');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = e => reject(e);
    });
  }
};

// ===== CATEGORIZER =====
function categorize(text, handle) {
  const t = ((text||'') + ' ' + (handle||'')).toLowerCase();
  const c = [];

  // --- Niche / specific (checked first) ---
  if (/figma|figjam|figma plugin|auto layout|figma token|design token|figma mcp/.test(t)) c.push('Figma');
  if (/\bui\b|\bux\b|user interface|user experience|usability|interaction design|information architecture|\bia\b.*design|accessibility|\ba11y\b|design system|component library|heuristic|wireframe|prototype|user research|persona|journey map/.test(t)) c.push('UI/UX');

  if (/framer|webflow|spline|rive|lottie|motion design|animation|micro.?interaction|after effects|\bae\b.*motion/.test(t)) c.push('Motion');
  if (/brand|branding|logo|identity|visual identity|brand.*guide|brand.*system/.test(t)) c.push('Branding');
  if (/portfolio|showcase|case study|my work|project showcase|design portfolio|work sample|personal site|personal website|my project/.test(t)) c.push('Portfolio');
  if (/\bfont\b|typeface|typography|type.*design|lettering|variable font|google fonts|inter\b|sf pro/.test(t)) c.push('Type');
  if (/3d|blender|cinema ?4d|three\.?js|webgl|r3f|react.three|shader|3d.*render/.test(t)) c.push('3D');
  if (/photo|photograph|camera|lightroom|editing|retouch|unsplash|pexels|visual.*story/.test(t)) c.push('Photo');
  if (/illustration|illustrat|vector|draw|sketch|artwork|digital art|procreate/.test(t)) c.push('Illustration');
  if (/\bclaude\b|anthropic|claude code|claude\.ai|sonnet|opus|haiku.*claude|artifacts?.*claude|mcp.*claude|claude.*mcp|claude.*api|anthropic.*sdk/.test(t)) c.push('Claude');

  // --- Broad categories ---
  if (/\bai\b|gpt|claude|llm|openai|anthropic|\bagent|mcp|copilot|chatgpt|gemini|diffusion|neural|machine learning|\bml\b|deep learning|transformer|prompt|fine.?tun|rag\b|embedding/.test(t)) c.push('AI');
  if (/design|\bui\b|\bux\b|figma|sketch|prototype|wireframe|typography|visual|layout|icon|color|dribbble|behance/.test(t) && !c.includes('Figma') && !c.includes('UI/UX')) c.push('Design');
  if (/\bcli\b|github|npm|\bcode\b|developer|open source|\bgit\b|\bapi\b|server|engineer|program|javascript|typescript|python|react|node|docker|backend|frontend|\bcss\b|rust\b|golang|swift|kotlin|supabase|vercel|nextjs|next\.js|tailwind|postgres|database|\bsql\b|redis|aws|deploy/.test(t)) c.push('Dev');
  if (/startup|founder|ship.*it|launch|saas|revenue|growth|funding|\bvc\b|venture|mvp|business|bootstrap|indie.*hack|solopreneur|mrr\b|arr\b/.test(t)) c.push('Startup');
  if (/travel|hotel|booking|flight|airport|trip|traveloka|airbnb|nomad|destination|backpack/.test(t)) c.push('Travel');
  if (/\bjob|hiring|career|resume|interview|salary|remote work|opportunity|recruit|lowongan|loker|apply|vacancy/.test(t)) c.push('Jobs');
  if (/tips|hack|trick|cara|gampang|tutorial|how to|guide|learn|course|step by step|cheat.?sheet|playbook/.test(t)) c.push('Tips');
  if (/product|feature|update|platform|\bapp\b|\btool\b|\bbuilt\b|release|shipped|changelog|roadmap/.test(t)) c.push('Product');
  if (/new tool|just launched|now available|check out|introducing|we.?just|announcing|dropping|here.?is/.test(t)) c.push('New Tools');
  if (/breaking|news|update|announce|official|confirmed|\bjust in\b|happening now|report|exclusive/.test(t)) c.push('News');
  if (/\bceo\b|leadership|management|culture|team|hiring.*culture|org.*design|career.*advice|mentorship|senior|staff|principal|manager/.test(t)) c.push('Leadership');
  if (/\bmoney\b|finance|invest|crypto|bitcoin|\beth\b|web3|nft|defi|blockchain|wallet|trading/.test(t)) c.push('Finance');
  if (/thread|🧵|1\/|breakdown|deep dive|explained|here.?s what|a thread/.test(t)) c.push('Thread');
  if (/meme|lol|lmao|😂|🤣|shitpost|joke|funny|humor/.test(t)) c.push('Meme');

  // --- Indonesia: Indonesian language / local context ---
  if (/\b(gue|gw|gak|nggak|banget|nih|dong|sih|ya kan|wkwk|anjir|cuy|bro|bos|kerjaan|kantor|kerja|jakarta|indonesia|indo|rupiah|idr|wib|ojol|gojek|grab|tokped|shopee|traveloka|bumn|pns|pln|bpjs|dpr|jokowi|prabowo|anies|kementerian|gubernur|gubernur|pemilu|pilkada|lebaran|mudik|ramadan|hari raya|idul|cuti bersama|asn|cpns)\b/.test(t)) c.push('Indonesia');

  if (c.length === 0) c.push('Other');
  return c;
}

// ===== HELPERS =====
function fmt(n) { return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':''+n; }
function fmtDate(ds) {
  const d = new Date(ds); if(isNaN(d)) return ds||'';
  const now = new Date(), h = Math.floor((now-d)/36e5);
  if(h<1) return 'now'; if(h<24) return h+'h'; if(h<48) return 'Yesterday';
  const o = {month:'short',day:'numeric'}; if(d.getFullYear()!==now.getFullYear()) o.year='numeric';
  return d.toLocaleDateString('en-US',o);
}
function ini(n) { return ((n||'?').replace(/[^a-zA-Z0-9\s]/g,'').trim()[0]||'?').toUpperCase(); }
function grad(h) {
  const p = [['#1d9bf0','#6366f1'],['#f91880','#ec4899'],['#00ba7c','#10b981'],['#ffd600','#f59e0b'],['#7856ff','#8b5cf6'],['#ff6900','#f97316'],['#17bf63','#06b6d4'],['#e44d26','#f06292']];
  let v=0; for(const c of (h||'x')) v=((v<<5)-v)+c.charCodeAt(0);
  return `linear-gradient(135deg,${p[Math.abs(v)%p.length].join(',')})`;
}
function hl(text, q) {
  let t = (text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  if(!q) return t;
  return t.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>');
}
function imgSrc(url, size) {
  if (!url) return '';
  // Twitter image URL format
  if (url.includes('pbs.twimg.com')) return url + (url.includes('?') ? '&' : '?') + 'format=jpg&name=' + (size||'small');
  return url;
}

// ===== CHECK IF DATA HAS MEDIA URLS =====
function hasMediaUrls(data) {
  // Check if at least some records have actual media image URLs
  const sample = data.slice(0, 50);
  return sample.some(b => {
    const media = b.md || b.media || [];
    return media.some(m => (m.u || m.url || '').includes('twimg.com'));
  });
}

// ===== NORMALIZE =====
function normalize(raw) {
  return raw.map(b => {
    const text = b.x || b.text || b.tweetText || '';
    const handle = b.h || b.handle || '';
    const name = b.n || b.displayName || '';
    const id = b.i || b.tweetId || '';
    const date = b.d || b.date || '';
    const verified = b.v === 1 || b.v === true || b.verified || false;
    const lang = b.g || b.lang || 'und';
    const url = b.tweetUrl || (handle ? 'https://x.com/' + handle + '/status/' + id : '');
    const met = b.m || b.metrics || {};
    const metrics = { r: met.r||met.replies||0, rt: met.rt||met.reposts||0, l: met.l||met.likes||0, bk: met.b||met.bookmarks||0, v: met.v||met.views||0 };

    // Media: normalize different formats
    let media = [];
    if (b.md && Array.isArray(b.md)) {
      media = b.md.map(m => ({ type: m.t||m.type||'photo', imgUrl: m.u||m.url||'', videoUrl: m.vu||m.videoUrl||null, w: m.w||0, h: m.h||0 }));
    } else if (b.media && Array.isArray(b.media)) {
      media = b.media.map(m => typeof m === 'object' ? { type: m.type||m.t||'photo', imgUrl: m.url||m.u||m.media_url_https||'', videoUrl: m.videoUrl||m.vu||null, w: m.w||0, h: m.h||0 } : { type:'photo', imgUrl:'', videoUrl:null, w:0, h:0 });
    }

    const bookmarkedAt = b.ba || b.bookmarkedAt || '';
    const thread = b.th || b.thread || null; // array of tweet texts if part of a self-thread
    const cats = categorize(text, handle);
    return { id, text, handle, name, verified, date, bookmarkedAt, lang, url, metrics, media, cats, thread };
  });
}

// ===== LOAD =====
function load(raw, saveToStorage) {
  BK = normalize(raw);
  document.getElementById('onboarding').style.display = 'none';
  ['statsBar','searchWrap','controlsWrap','filterSticky'].forEach(id => document.getElementById(id).style.display = '');
  initFilterSticky();
  document.getElementById('resultInfo').style.display = '';
  document.getElementById('totalCount').textContent = BK.length;
  document.getElementById('authorCount').textContent = new Set(BK.map(b=>b.handle)).size;
  document.getElementById('mediaCount').textContent = BK.filter(b=>b.media.length>0).length;

  // Check if media URLs are present
  const hasMedia = BK.some(b => b.media.some(m => m.imgUrl && m.imgUrl.includes('twimg')));
  if (!hasMedia && BK.filter(b=>b.media.length>0).length > 0) {
    document.getElementById('bannerWrap').innerHTML = '<div class="banner"><div class="banner-box">Image previews not available in cached data. Load the latest <b>x-bookmarks.json</b> or re-sync to see images.<button class="pill" onclick="promptLoadJson()">Load JSON</button><button class="pill pill-accent" style="margin-left:6px" onclick="openSyncModal()">Sync</button></div></div>';
  } else {
    document.getElementById('bannerWrap').innerHTML = '';
  }

  renderFilters(); renderTimeFilters(); render();
  if (saveToStorage !== false) {
    IDB.save(raw).catch(() => {});
  }
}

function promptLoadJson() {
  document.getElementById('hiddenFileInput').click();
}

// ===== FILTER + SORT =====
function getFiltered() {
  let f = [...BK];
  if (activeFilter === 'Starred') f = f.filter(b => starredIds.has(b.id));
  else if (activeFilter !== 'All') f = f.filter(b => b.cats.includes(activeFilter));
  if (activeTimeFilter) {
    f = f.filter(b => {
      const d = new Date(b.date); if (isNaN(d)) return false;
      if (activeTimeFilter.type === 'year') return String(d.getFullYear()) === activeTimeFilter.value;
      if (activeTimeFilter.type === 'month') {
        const ym = d.getFullYear() + '-' + String(d.getMonth()).padStart(2,'0');
        return ym === activeTimeFilter.value;
      }
      if (activeTimeFilter.type === 'quick') {
        // Use bookmarkedAt (when bookmarked) if available, fall back to tweet date
        const bd = b.bookmarkedAt ? new Date(b.bookmarkedAt) : d;
        if (isNaN(bd)) return false;
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        if (activeTimeFilter.value === 'today') return bd >= today;
        if (activeTimeFilter.value === 'thisweek') {
          const weekStart = new Date(today); weekStart.setDate(today.getDate() - today.getDay());
          return bd >= weekStart;
        }
        if (activeTimeFilter.value === 'lastweek') {
          const thisWeekStart = new Date(today); thisWeekStart.setDate(today.getDate() - today.getDay());
          const lastWeekStart = new Date(thisWeekStart); lastWeekStart.setDate(thisWeekStart.getDate() - 7);
          return bd >= lastWeekStart && bd < thisWeekStart;
        }
      }
      return true;
    });
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    f = f.filter(b => b.text.toLowerCase().includes(q) || b.handle.toLowerCase().includes(q) || b.name.toLowerCase().includes(q) || b.cats.some(c=>c.toLowerCase().includes(q)));
  }
  switch(activeSort) {
    case 'newest': f.sort((a,b)=>new Date(b.date)-new Date(a.date)); break;
    case 'oldest': f.sort((a,b)=>new Date(a.date)-new Date(b.date)); break;
    case 'popular': f.sort((a,b)=>b.metrics.l-a.metrics.l); break;
    case 'views': f.sort((a,b)=>b.metrics.v-a.metrics.v); break;
    case 'media': f = f.filter(b=>b.media.length>0 && b.media[0].imgUrl).sort((a,b)=>new Date(b.date)-new Date(a.date)); break;
  }
  return f;
}

// ===== RENDER =====
function renderFilters() {
  const cats = new Map(); cats.set('All', BK.length);
  const starCount = BK.filter(b => starredIds.has(b.id)).length;
  if (starCount > 0) cats.set('Starred', starCount);
  BK.forEach(b => b.cats.forEach(c => cats.set(c, (cats.get(c)||0)+1)));
  // Sort: All first, Starred second, Other last, broad before niche
  const broad = ['AI','Design','Dev','Product','Startup','Travel','Jobs','Tips','News','New Tools','Indonesia','Finance','Leadership','Thread','Meme'];
  const niche = ['Figma','UI/UX','Claude','Portfolio','Paper','Motion','Branding','Type','3D','Photo','Illustration'];
  const order = ['All', 'Starred', ...broad, ...niche, 'Other'];
  const sorted = [...cats.entries()].sort((a,b) => {
    const ai = order.indexOf(a[0]), bi = order.indexOf(b[0]);
    return (ai===-1?99:ai) - (bi===-1?99:bi);
  });
  const el = document.getElementById('filterContainer');
  el.innerHTML = '';
  sorted.forEach(([cat, n]) => {
    if (n === 0) return; // skip empty categories
    const btn = document.createElement('button');
    btn.className = 'pill' + (activeFilter===cat?' active':'') + (cat==='Starred'?' pill-starred':'');
    btn.innerHTML = (cat==='Starred'?IC.star+' ':'')+cat + ' <span style="opacity:.6">' + n + '</span>';
    if (cat==='Starred') btn.querySelector('svg').style.cssText='width:12px;height:12px;fill:#fbbf24;vertical-align:-1px;margin-right:2px';
    btn.onclick = () => { activeFilter=cat; displayLimit=80; renderFilters(); render(); };
    el.appendChild(btn);
  });
}

function renderTimeFilters() {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  // Collect all year-months from bookmarks
  const ym = new Map();
  BK.forEach(b => {
    const d = new Date(b.date); if (isNaN(d)) return;
    const y = d.getFullYear(), m = d.getMonth();
    const key = y + '-' + String(m).padStart(2,'0');
    ym.set(key, (ym.get(key)||0) + 1);
  });
  const sorted = [...ym.entries()].sort((a,b) => b[0].localeCompare(a[0]));
  if (sorted.length === 0) return;

  // Get unique years
  const years = [...new Set(sorted.map(([k]) => k.split('-')[0]))].sort((a,b) => b-a);

  const el = document.getElementById('timeContainer');
  let html = '<button class="pill' + (!activeTimeFilter ? ' active' : '') + '" onclick="activeTimeFilter=null;displayLimit=80;renderTimeFilters();render()">All time</button>';

  // Quick time filters
  const quickFilters = [
    { label: 'Today', type: 'quick', value: 'today' },
    { label: 'This week', type: 'quick', value: 'thisweek' },
    { label: 'Last week', type: 'quick', value: 'lastweek' },
  ];
  quickFilters.forEach(q => {
    const isActive = activeTimeFilter && activeTimeFilter.type === 'quick' && activeTimeFilter.value === q.value;
    html += '<button class="pill' + (isActive ? ' active' : '') + '" onclick="setTimeFilter(\'' + q.type + '\',\'' + q.value + '\')">' + q.label + '</button>';
  });

  // Year pills (on mobile: show 3 recent as pills, rest in dropdown)
  const isMobile = window.innerWidth <= 640;
  const pillYears = isMobile ? years.slice(0, 3) : years;
  const dropdownYears = isMobile ? years.slice(3) : [];

  pillYears.forEach(y => {
    const isYear = activeTimeFilter && activeTimeFilter.type === 'year' && activeTimeFilter.value === y;
    html += '<button class="pill' + (isYear ? ' active' : '') + '" onclick="setTimeFilter(\'year\',\'' + y + '\')">' + y + '</button>';
  });

  if (dropdownYears.length > 0) {
    const selOlderYear = activeTimeFilter && activeTimeFilter.type === 'year' && dropdownYears.includes(activeTimeFilter.value) ? activeTimeFilter.value : '';
    html += '<select class="time-select" onchange="if(this.value){setTimeFilter(\'year\',this.value)}">';
    html += '<option value=""' + (!selOlderYear ? ' selected' : '') + '>Older...</option>';
    dropdownYears.forEach(y => {
      html += '<option value="' + y + '"' + (selOlderYear === y ? ' selected' : '') + '>' + y + '</option>';
    });
    html += '</select>';
  }

  // Month select (only show if a year is selected)
  if (activeTimeFilter && activeTimeFilter.type === 'year') {
    const selYear = activeTimeFilter.value;
    const monthsInYear = sorted.filter(([k]) => k.startsWith(selYear)).map(([k, n]) => {
      const m = parseInt(k.split('-')[1]);
      return { m, label: months[m], n };
    });
    if (monthsInYear.length > 1) {
      html += '<select class="time-select" onchange="if(this.value){setTimeFilter(\'month\',this.value)}else{setTimeFilter(\'year\',\'' + selYear + '\')}">';
      html += '<option value="">All months</option>';
      monthsInYear.forEach(({ m, label, n }) => {
        const val = selYear + '-' + String(m).padStart(2,'0');
        const sel = activeTimeFilter.type === 'month' && activeTimeFilter.value === val ? ' selected' : '';
        html += '<option value="' + val + '"' + sel + '>' + label + ' (' + n + ')</option>';
      });
      html += '</select>';
    }
  } else if (activeTimeFilter && activeTimeFilter.type === 'month') {
    // Keep month select visible
    const selYear = activeTimeFilter.value.split('-')[0];
    const monthsInYear = sorted.filter(([k]) => k.startsWith(selYear)).map(([k, n]) => {
      const m = parseInt(k.split('-')[1]);
      return { m, label: months[m], n };
    });
    html += '<select class="time-select" onchange="if(this.value){setTimeFilter(\'month\',this.value)}else{setTimeFilter(\'year\',\'' + selYear + '\')}">';
    html += '<option value="">All months</option>';
    monthsInYear.forEach(({ m, label, n }) => {
      const val = selYear + '-' + String(m).padStart(2,'0');
      const sel = activeTimeFilter.value === val ? ' selected' : '';
      html += '<option value="' + val + '"' + sel + '>' + label + ' (' + n + ')</option>';
    });
    html += '</select>';
  }

  el.innerHTML = html;
}

function setTimeFilter(type, value) {
  activeTimeFilter = { type, value };
  displayLimit = 80;
  renderTimeFilters();
  render();
}

function cardHTML(b, idx) {
  const img = b.media[0];
  const hasImg = img && img.imgUrl;
  const isVideo = img && (img.type === 'video' || img.type === 'animated_gif');
  const needsFade = b.text.length > 160;

  let mediaHTML = '';
  if (hasImg && isVideo && img.videoUrl) {
    // Video/GIF with autoplay on hover
    mediaHTML = '<div class="card-media">'
      + '<video class="card-video" src="' + img.videoUrl + '" poster="' + imgSrc(img.imgUrl,'medium') + '" muted loop playsinline preload="none" onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0"></video>'
      + '<div class="card-play"><svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:#fff"><path d="M8 5v14l11-7z"/></svg></div>'
      + (b.media.length > 1 ? '<div class="card-multi">+' + (b.media.length-1) + '</div>' : '')
      + '</div>';
  } else if (hasImg) {
    mediaHTML = '<div class="card-media">'
      + '<img class="card-img" src="' + imgSrc(img.imgUrl,'medium') + '" loading="lazy" decoding="async" alt="" onerror="this.parentElement.style.display=\'none\'">'
      + (b.media.length > 1 ? '<div class="card-multi">+' + (b.media.length-1) + '</div>' : '')
      + '</div>';
  }

  const mediaTag = b.media.length > 0 && hasImg
    ? '<span class="tag tag-media">' + (isVideo ? (img.type==='animated_gif'?'GIF':'Video') : 'Photo') + (b.media.length>1?' +'+b.media.length:'') + '</span>'
    : '';

  const isStar = starredIds.has(b.id);
  return '<div class="card" onclick="openLb(' + idx + ')" data-idx="' + idx + '">'
    + '<button class="card-star' + (isStar?' starred':'') + '" onclick="toggleStar(\'' + b.id + '\',event)">' + IC.star + '</button>'
    + mediaHTML
    + '<div class="card-body">'
    + '<div class="card-author"><div class="card-avatar" style="background:' + grad(b.handle) + '">' + ini(b.name) + '</div><div><div class="card-name">' + hl(b.name, searchQuery) + ' ' + (b.verified?IC.verified:'') + '</div><div class="card-handle">@' + b.handle + '</div></div></div>'
    + (b.text ? '<div class="card-text">' + hl(b.text, searchQuery) + (needsFade?'<div class="card-text-fade"></div>':'') + '</div>' : '')
    + '<div class="card-tags">' + b.cats.map(c=>'<span class="tag tag-cat tag-'+c.toLowerCase().replace(/[\s\/]/g,'')+'">'+c+'</span>').join('') + mediaTag + (b.thread ? '<span class="tag" style="background:#1d3a5c;color:#1d9bf0">Thread ' + b.thread.length + '</span>' : '') + '</div>'
    + '<div class="card-stats"><span>' + IC.like + ' ' + fmt(b.metrics.l) + '</span><span>' + IC.rt + ' ' + fmt(b.metrics.rt) + '</span><span>' + IC.view + ' ' + fmt(b.metrics.v) + '</span><span style="margin-left:auto">' + fmtDate(b.date) + '</span></div>'
    + '</div></div>';
}

function thumbHTML(b, idx) {
  const img = b.media[0];
  if (!img || !img.imgUrl) return '';
  const isVideo = img.type === 'video' || img.type === 'animated_gif';
  const isStar = starredIds.has(b.id);
  return '<div class="thumb" onclick="openLb(' + idx + ')">'
    + '<img src="' + imgSrc(img.imgUrl, 'small') + '" loading="lazy" decoding="async" alt="" onerror="this.parentElement.style.display=\'none\'">'
    + (isStar ? '<div class="thumb-star">' + IC.star + '</div>' : '')
    + (isVideo ? '<div class="thumb-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>' : '')
    + '<div class="thumb-overlay"><div class="thumb-stats"><span>' + IC.like + ' ' + fmt(b.metrics.l) + '</span><span>' + IC.view + ' ' + fmt(b.metrics.v) + '</span></div></div>'
    + '</div>';
}

// ===== STICKY FILTER =====
let filterExpanded = true;
let filterManual = false; // true if user manually toggled
let lastScrollY = 0;
function initFilterSticky() {
  const topbar = document.querySelector('.topbar');
  const sticky = document.getElementById('filterSticky');
  if (!topbar || !sticky) return;
  const updateTopH = () => document.documentElement.style.setProperty('--topbar-h', topbar.offsetHeight + 'px');
  updateTopH();
  window.addEventListener('resize', updateTopH);
  // Auto-collapse on scroll down, expand on scroll to top
  lastScrollY = window.scrollY;
  window.addEventListener('scroll', () => {
    const sy = window.scrollY;
    const delta = sy - lastScrollY;
    lastScrollY = sy;
    if (filterManual) return;
    // Scrolling down past threshold → collapse
    if (delta > 4 && sy > 80 && filterExpanded) {
      filterExpanded = false;
      sticky.classList.add('collapsed');
    }
    // Scrolled back to top → expand
    if (sy <= 10 && !filterExpanded) {
      filterExpanded = true;
      sticky.classList.remove('collapsed');
    }
  }, { passive: true });
}
function toggleFilterExpand() {
  const sticky = document.getElementById('filterSticky');
  filterExpanded = !filterExpanded;
  filterManual = true;
  sticky.classList.toggle('collapsed', !filterExpanded);
  // Reset manual override after 3s so auto-behavior resumes
  setTimeout(() => { filterManual = false; }, 3000);
}

function setView(v) {
  activeView = v;
  document.getElementById('viewCard').className = 'view-btn' + (v==='card'?' active':'');
  document.getElementById('viewThumb').className = 'view-btn' + (v==='thumb'?' active':'');
  displayLimit = v === 'thumb' ? 200 : 80;
  render();
}

function render() {
  const filtered = getFiltered();
  window.__filtered = filtered;
  const grid = document.getElementById('grid');

  if (activeView === 'thumb') {
    // Thumbnail grid: only show items with media
    const withMedia = filtered.filter(b => b.media.length > 0 && b.media[0].imgUrl);
    // Re-index so openLb works correctly — store full filtered list but render media-only
    window.__filtered = withMedia;
    document.getElementById('resultInfo').textContent = withMedia.length + ' media items' + (withMedia.length !== filtered.length ? ' (of ' + filtered.length + ')' : '');
    if (!withMedia.length) { grid.innerHTML = '<div class="empty"><h3>No media found</h3><p>Try a different filter</p></div>'; grid.className = 'masonry'; return; }
    const vis = withMedia.slice(0, displayLimit);
    let html = vis.map((b,i) => thumbHTML(b, i)).join('');
    if (withMedia.length > displayLimit) {
      html += '<div class="load-more" style="grid-column:1/-1"><button class="pill" onclick="displayLimit+=200;render()">Show more (' + (withMedia.length-displayLimit) + ' remaining)</button></div>';
    }
    grid.className = 'thumb-grid';
    grid.innerHTML = html;
    // Infinite scroll for thumbnail view
    if (!window.__thumbScroll) {
      window.__thumbScroll = true;
      window.addEventListener('scroll', () => {
        if (activeView !== 'thumb') return;
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 600) {
          const withMedia = window.__filtered;
          if (displayLimit < withMedia.length) { displayLimit += 200; render(); }
        }
      });
    }
  } else {
    document.getElementById('resultInfo').textContent = filtered.length === BK.length ? filtered.length + ' bookmarks' : filtered.length + ' of ' + BK.length;
    grid.className = 'masonry';
    if (!filtered.length) { grid.innerHTML = '<div class="empty"><h3>No bookmarks found</h3><p>Try a different search or filter</p></div>'; return; }
    const vis = filtered.slice(0, displayLimit);
    let html = vis.map((b,i) => cardHTML(b, i)).join('');
    if (filtered.length > displayLimit) {
      html += '<div class="load-more"><button class="pill" onclick="displayLimit+=80;render()">Show more (' + (filtered.length-displayLimit) + ' remaining)</button></div>';
    }
    grid.innerHTML = html;
  }
}

// ===== LIGHTBOX =====
function openLb(idx) {
  const b = window.__filtered[idx]; if(!b) return;
  const img = b.media[0];
  const hasImg = img && img.imgUrl;
  const isVideo = img && (img.type === 'video' || img.type === 'animated_gif');

  let mainMedia = '';
  if (hasImg && isVideo && img.videoUrl) {
    mainMedia = '<video class="lb-vid" src="' + img.videoUrl + '" poster="' + imgSrc(img.imgUrl,'large') + '" controls autoplay muted loop playsinline></video>';
  } else if (hasImg) {
    mainMedia = '<img class="lb-img" src="' + imgSrc(img.imgUrl,'large') + '" alt="">';
  }

  let extras = '';
  if (b.media.length > 1) {
    extras = '<div class="lb-extras">' + b.media.slice(1).map(m =>
      m.imgUrl ? '<img src="' + imgSrc(m.imgUrl,'small') + '" onerror="this.style.display=\'none\'">' : ''
    ).join('') + '</div>';
  }

  document.getElementById('lbContent').innerHTML = mainMedia
    + '<div class="lb-body">'

// ===== LIGHTBOX DRAG-DOWN TO CLOSE (mobile) =====
(function() {
  const lb = document.getElementById('lightbox');
  const lbc = document.getElementById('lbContent');
  let startY = 0, currentY = 0, dragging = false;

  lbc.addEventListener('touchstart', function(e) {
    if (lbc.scrollTop > 0) return; // only drag when scrolled to top
    startY = e.touches[0].clientY;
    currentY = startY;
    dragging = false;
  }, { passive: true });

  lbc.addEventListener('touchmove', function(e) {
    const dy = e.touches[0].clientY - startY;
    if (!dragging && dy > 8) { dragging = true; lbc.classList.add('dragging'); }
    if (!dragging) return;
    currentY = e.touches[0].clientY;
    const offset = Math.max(0, currentY - startY);
    lbc.style.transform = 'translateY(' + offset + 'px)';
    lbc.style.opacity = Math.max(0.2, 1 - offset / 400);
    if (offset > 0) e.preventDefault();
  }, { passive: false });

  lbc.addEventListener('touchend', function() {
    if (!dragging) return;
    const offset = currentY - startY;
    dragging = false;
    lbc.classList.remove('dragging');
    if (offset > 120) {
      lbc.style.transform = 'translateY(100vh)';
      lbc.style.opacity = '0';
      setTimeout(closeLightbox, 250);
    } else {
      lbc.style.transform = '';
      lbc.style.opacity = '';
    }
  }, { passive: true });
})();

// ===== FILE LOADING =====
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const hiddenInput = document.getElementById('hiddenFileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if(e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if(e.target.files[0]) readFile(e.target.files[0]); });

// Also support drag-and-drop anywhere on the page
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer?.files[0];
  if (file && file.name.endsWith('.json')) readFile(file);
});

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) { alert('Invalid JSON: expected an array.'); return; }

      // If we already have bookmarks loaded, merge instead of replace
      if (BK.length > 0) {
        const existingIds = new Set(BK.map(b => b.id));
        IDB.get().then(rawExisting => {
          rawExisting = rawExisting || [];
          let addedCount = 0;
          const newItems = [];
          for (const item of data) {
            const id = item.i || item.id || item.tweetId || '';
            if (!existingIds.has(id)) {
              newItems.push(item);
              addedCount++;
            }
          }
          if (addedCount === 0 && data.length <= BK.length) {
            setStatus('All bookmarks already loaded — nothing new to add!');
            return;
          }
          if (addedCount === 0 && data.length > BK.length) {
            // Full re-import with more data — replace
            load(data);
            pushToCloud(data);
            return;
          }
          const merged = [...newItems, ...rawExisting];
          load(merged);
          setStatus('Merged ' + addedCount + ' new bookmarks! Total: ' + BK.length);
          if (newItems.length) pushToCloud(newItems);
        });
      } else {
        load(data);
        pushToCloud(data);
      }
    } catch(err) { alert('Could not parse JSON: ' + err.message); }
  };
  reader.readAsText(file);
}

function setStatus(msg) {
  const el = document.getElementById('bannerWrap');
  if (el) el.innerHTML = '<div class="banner"><div class="banner-box">' + msg + '</div></div>';
  setTimeout(() => { if (el) el.innerHTML = ''; }, 5000);
}

function exportForClaude() {
  if (!BK.length) return;
  const box = document.getElementById('syncBox');
  box.innerHTML = '<h2 style="margin:0 0 8px">Export for Claude</h2>'
    + '<p style="color:#8899a6;margin:0 0 16px;font-size:13px">Pick a range to export</p>'
    + '<div style="display:flex;gap:10px;justify-content:center">'
    + '<button class="pill pill-accent" onclick="doExportClaude(30)">Last 30 days</button>'
    + '<button class="pill" onclick="doExportClaude(0)">Full export</button>'
    + '</div>'
    + '<div style="margin-top:12px"><button class="pill" onclick="closeSyncModal()">Cancel</button></div>';
  document.getElementById('syncModal').classList.add('open');
}
function doExportClaude(days) {
  closeSyncModal();
  let src = BK;
  if (days > 0) {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
    src = BK.filter(b => new Date(b.date) >= cutoff);
  }
  if (!src.length) { setStatus('No bookmarks found in that range.'); return; }
  const exported = src.map(b => {
    const obj = {
      text: b.text,
      author: '@' + b.handle + (b.name ? ' (' + b.name + ')' : ''),
      date: b.date,
      categories: b.cats,
      likes: b.metrics.l,
      retweets: b.metrics.rt,
      views: b.metrics.v,
      url: b.url,
      starred: starredIds.has(b.id),
      hasMedia: b.media.length > 0,
    };
    if (b.thread) obj.thread = b.thread;
    return obj;
  });
  const today = new Date().toISOString().slice(0, 10);
  const range = days > 0 ? 'last-' + days + 'days' : 'full';
  const fname = 'x-bookmarks-claude-' + range + '-' + today + '-' + exported.length + 'items.json';
  const blob = new Blob([JSON.stringify(exported, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  setStatus('Exported ' + exported.length + ' bookmarks' + (days > 0 ? ' (last ' + days + ' days)' : '') + '.');
}

// ===== AUTO-LOAD (runs after bookmarks-data.js if present) =====
function showOnboarding() { document.getElementById('onboarding').style.display = ''; }
function loadFromCloud() {
  return pullAllCloudData().then(data => {
    if (data && data.length) { load(data); return true; }
    return false;
  });
}
function autoLoad() {
  loadStarred().then(() => {
    IDB.get().then(d => {
      if (d && Array.isArray(d) && d.length) { load(d, false); cloudSync(d); return; }
      if (window.__BUNDLED_BOOKMARKS && window.__BUNDLED_BOOKMARKS.length) {
        load(window.__BUNDLED_BOOKMARKS, true);
        cloudSync(window.__BUNDLED_BOOKMARKS);
        return;
      }
      try {
        const saved = localStorage.getItem('xbk2');
        if (saved) { const d = JSON.parse(saved); if(Array.isArray(d) && d.length) { load(d, true); localStorage.removeItem('xbk2'); cloudSync(d); return; } }
      } catch(e) {}
      // No local data — try cloud before showing onboarding
      loadFromCloud().then(ok => { if (!ok) showOnboarding(); }).catch(() => showOnboarding());
    }).catch(() => {
      if (window.__BUNDLED_BOOKMARKS && window.__BUNDLED_BOOKMARKS.length) { load(window.__BUNDLED_BOOKMARKS, true); cloudSync(window.__BUNDLED_BOOKMARKS); }
      else loadFromCloud().then(ok => { if (!ok) showOnboarding(); }).catch(() => showOnboarding());
    });
  });
}
